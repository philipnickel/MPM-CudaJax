hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params:
      sim.n_particles: 1000,10000
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: MULTIRUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra: []
    task: []
  job:
    name: simulate
    chdir: null
    override_dirname: ''
    id: ???
    num: ???
    config_name: sweep_quick
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /Users/philipnickel/Library/CloudStorage/ProtonDrive-philip@kni.dk-folder/DTU/2026-Spring/CUDA/MPM-Project_v2/MPM-CudaJax
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /Users/philipnickel/Library/CloudStorage/ProtonDrive-philip@kni.dk-folder/DTU/2026-Spring/CUDA/MPM-Project_v2/MPM-CudaJax/conf
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: ???
    choices:
      kernel: jax
      sim: default
      material: jelly
      backend: jax
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
backend:
  name: jax
material:
  elasticity:
    name: CorotatedElasticity
    E: 2000000.0
    nu: 0.4
  plasticity:
    name: IdentityPlasticity
  color: blue
sim:
  num_frames: 5
  steps_per_frame: 10
  n_particles: 2000
  initial_velocity:
  - 0.0
  - 0.0
  - -0.5
  num_grids: 64
  dt: 0.0003
  gravity:
  - 0.0
  - 0.0
  - -9.8
  rho: 1000.0
  clip_bound: 0.5
  damping: 1.0
  center:
  - 0.5
  - 0.5
  - 0.5
  size:
  - 1.0
  - 1.0
  - 1.0
  boundary_conditions:
  - type: surface_collider
    point:
    - 1.0
    - 1.0
    - 0.02
    normal:
    - 0.0
    - 0.0
    - 1.0
    surface: sticky
    friction: 0.0
    start_time: 0.0
    end_time: 1000.0
kernel:
  name: jax
output_dir: ./output
tag: quick
benchmark: true
