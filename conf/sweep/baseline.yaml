# Baseline scaling sweep: JAX backend, vary particle count.
# Usage: uv run --extra jax-cuda python simulate.py --config-name sweep/baseline -m
defaults:
  - /backend: jax
  - /material: jelly
  - /kernel: jax
  - _self_

hydra:
  mode: MULTIRUN
  sweeper:
    params:
      sim.n_particles: 1000,5000,10000,50000,100000,400000

output_dir: ./output
tag: baseline
benchmark: true

sim:
  num_frames: 20
  steps_per_frame: 10
  n_particles: 2000  # overridden by sweep
  initial_velocity: [0.0, 0.0, -0.5]
  num_grids: 64
  dt: 3e-4
  gravity: [0.0, 0.0, -9.8]
  rho: 1000.0
  clip_bound: 0.5
  damping: 1.0
  center: [0.5, 0.5, 0.5]
  size: [1.0, 1.0, 1.0]
  boundary_conditions:
    - type: surface_collider
      point: [1.0, 1.0, 0.02]
      normal: [0.0, 0.0, 1.0]
      surface: sticky
      friction: 0.0
      start_time: 0.0
      end_time: 1e3
