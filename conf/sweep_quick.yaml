# Quick sanity check: 2 particle counts, 5 frames.
# Usage: uv run --extra jax-cuda python simulate.py --config-name sweep_quick
defaults:
  - config
  - _self_

hydra:
  mode: MULTIRUN
  sweeper:
    params:
      sim.n_particles: 1000,10000

benchmark: true
tag: quick
sim:
  num_frames: 5
  num_grids: 64
