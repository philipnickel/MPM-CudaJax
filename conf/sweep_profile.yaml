# Profile sweep: all kernels × all profilers.
# Usage: uv run --extra jax-cuda python simulate.py -cn sweep_profile
#
# Runs each kernel with nsys, ncu, and jax profiler.
# Uses small problem size since ncu is very slow.
defaults:
  - config
  - _self_

hydra:
  mode: MULTIRUN
  sweeper:
    params:
      kernel: jax,cuda_v1,cuda_v3
      profile: nsys,ncu,jax

benchmark: true
tag: profile
sim:
  num_frames: 3
  n_particles: 10000
  num_grids: 64
