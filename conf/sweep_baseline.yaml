# Baseline scaling sweep: vary particle count on JAX backend.
# Usage: uv run --extra jax-cuda python simulate.py --config-name sweep_baseline
defaults:
  - config  # inherit everything from config.yaml
  - _self_

hydra:
  mode: MULTIRUN
  sweeper:
    params:
      sim.n_particles: 1000,5000,10000,50000,100000,400000

benchmark: true
tag: baseline
sim:
  num_frames: 20
  num_grids: 64
